version: '3.8'

services:
  # 1. PostgreSQL (기존 DB)
  postgres:
    image: postgres:15
    container_name: crepic-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: crepic
      POSTGRES_USER: postgres # ⭐️ 네 application.yml에 맞춤!
      POSTGRES_PASSWORD: password # ⭐️ 인텔리제이 환경변수 DB_PASSWORD에 'password'라고 적어!
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # 2. Redis (Phase 3 & 4 큐)
  redis:
    image: redis:alpine
    container_name: crepic-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes # 데이터 유실 방지 옵션
    volumes:
      - redis-data:/data

  # 3. Zookeeper (Kafka의 매니저)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # 4. Kafka (Phase 5의 핵심! 메시지 브로커)
  kafka:
    image: confluentinc/cp-kafka:7.3.2
    container_name: kafka
    depends_on:
      - zookeeper # 주키퍼가 먼저 켜져야 카프카가 켜짐
    ports:
      - "9092:9092" # 스프링부트랑 통신할 포트
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1 # 우리 컴 1대니까 복제본은 1개로 세팅

volumes:
  postgres-data:
  redis-data: