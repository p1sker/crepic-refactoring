version: '3.8'

services:
  # 1. PostgreSQL (기존 DB)
  postgres:
    image: postgres:15
    container_name: crepic-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: crepic
      POSTGRES_USER: postgres # ⭐️ 네 application.yml에 맞춤!
      POSTGRES_PASSWORD: password # ⭐️ 인텔리제이 환경변수 DB_PASSWORD에 'password'라고 적어!
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # 2. Redis (Phase 3를 위한 신무기)
  redis:
    image: redis:alpine
    container_name: crepic-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes # 데이터 유실 방지 옵션
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data: